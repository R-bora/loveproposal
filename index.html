<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Romantic Request</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Elegant continuous heart-pattern background layer */
            background-color: #3a0a24;
            background-image: radial-gradient(rgba(255, 77, 109, 0.15) 1px, transparent 0),
                              radial-gradient(rgba(255, 77, 109, 0.15) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }

        /* Glassmorphic container box */
        .container {
            text-align: center;
            background: rgba(20, 5, 15, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem 2rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            max-width: 400px;
            width: 90%;
            transition: all 0.5s ease;
            position: relative;
            z-index: 10;
            margin-bottom: 60px; /* Leaves space so card doesn't overlap the footer on small screens */
        }

        .heart-icon {
            font-size: 4.5rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: pulse 1.2s infinite alternate cubic-bezier(0.215, 0.610, 0.355, 1);
            filter: drop-shadow(0 0 10px rgba(255, 77, 109, 0.6));
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.12); }
        }

        h1 {
            color: #fff;
            text-shadow: 0 2px 10px rgba(255, 77, 109, 0.5);
            font-size: 1.8rem;
            margin-bottom: 1rem;
            font-weight: normal;
        }

        p {
            color: #ffd3e0;
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            font-style: italic;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 60px;
            position: relative;
        }

        button {
            padding: 12px 28px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            touch-action: manipulation;
        }

        #yes-btn {
            background: linear-gradient(45deg, #ff4d6d, #ff758f);
            color: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        #yes-btn:active {
            transform: scale(0.95);
        }

        #no-btn {
            background-color: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            z-index: 100;
            transition: left .15s linear, top .15s linear;
        }

        /* Floating Falling Hearts Animation elements */
        .heart-fall {
            position: absolute;
            color: rgba(255, 77, 109, 0.6);
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            animation: floatUp 4s linear forwards;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(105vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            15% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-10vh) scale(1.4) rotate(360deg);
                opacity: 0;
            }
        }

        /* Professional Website Footer Styling */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 10px;
            background: rgba(15, 3, 10, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 211, 224, 0.6);
            z-index: 5;
        }

        footer .footer-links {
            margin-bottom: 5px;
        }

        footer .footer-links a {
            color: rgba(255, 77, 109, 0.8);
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s;
        }

        footer .footer-links a:hover {
            color: #ff758f;
        }

        footer .creator-credit {
            font-style: normal;
            font-size: 0.8rem;
            margin-top: 4px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container" id="main-card">
        <div class="heart-icon" id="main-emoji">❤️</div>
        
        <h1 id="headline">From the moment we met...</h1>
        <p id="subtext">Will you make me the happiest person and be mine?</p>

        <div class="btn-group">
            <button id="yes-btn" onclick="celebrate()">Yes</button>
            <button id="no-btn" 
                    onmouseover="handleNoInteraction(event)" 
                    ontouchstart="handleNoInteraction(event)" 
                    onclick="handleNoInteraction(event)">No</button>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#" onclick="alert('Terms: You must love the creator forever.')">Terms of Service</a> | 
            <a href="#" onclick="alert('Privacy: Your secrets are safe with me.')">Privacy Policy</a>
        </div>
        <div>&copy; 2026 All Rights Reserved.</div>
        <div class="creator-credit">Designed & Developed with ❤️ by <strong>Rohan Bora</strong></div>
    </footer>

   <script>
let heartInterval = 0;

function handleNoInteraction(e) {
    e.preventDefault();
    moveNoButton();
}

function moveNoButton() {
    const noBtn = document.getElementById("no-btn");

    if (noBtn.parentElement !== document.body) {
        document.body.appendChild(noBtn);
    }

    const margin = 15;

    const vw = document.documentElement.clientWidth;
    const vh = document.documentElement.clientHeight;

    const rect = noBtn.getBoundingClientRect();
    const btnWidth = rect.width;
    const btnHeight = rect.height;

    // Leave extra bottom padding so the button doesn't jump directly over the footer
    const maxX = vw - btnWidth - margin;
    const maxY = vh - btnHeight - margin - 60; 

    const x = Math.random() * (maxX - margin) + margin;
    const y = Math.random() * (maxY - margin) + margin;

    noBtn.style.position = "fixed";
    noBtn.style.left = `${x}px`;
    noBtn.style.top = `${y}px`;
    noBtn.style.transform = "none";
    noBtn.style.zIndex = "9999";
}

function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart-fall");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 2 + 2.5) + "s";
    heart.style.fontSize = (Math.random() * 20 + 16) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 4500);
}

function startHeartRain() {
    if (!heartInterval) {
        heartInterval = setInterval(createHeart, 150);
    }
}

function celebrate() {
    const headline = document.getElementById("headline");
    const subtext = document.getElementById("subtext");
    const emoji = document.getElementById("main-emoji");
    const noBtn = document.getElementById("no-btn");
    const yesBtn = document.getElementById("yes-btn");
    const card = document.getElementById("main-card");

    startHeartRain();

    headline.innerText = "Forever Yours ❤️";
    subtext.innerText = "You've made my entire world complete.";
    emoji.innerText = "🥰💖✨";

    noBtn.style.display = "none";
    yesBtn.style.transform = "scale(1.1)";
    yesBtn.style.pointerEvents = "none";
    yesBtn.innerText = "Thank You!";

    card.style.background = "rgba(40, 10, 25, 0.85)";
    card.style.boxShadow = "0 20px 50px rgba(255,77,109,.4)";
}

window.addEventListener("resize", () => {
    const noBtn = document.getElementById("no-btn");
    if (noBtn.style.position === "fixed") {
        moveNoButton();
    }
});
</script>
</body>
</html>
